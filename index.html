<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitor de Ambiente</title>

<style>
body {
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
  min-height: 100vh;
  margin: 0;
}

.card {
  padding: 30px;
  width: 280px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

.valor {
  font-size: 50px;
  font-weight: bold;
  margin: 15px 0;
}

.barra {
  width: 100%;
  height: 15px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.progreso {
  height: 100%;
  width: 0%;
  transition: 0.8s ease-in-out;
}

.estado {
  margin-top: 15px;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
</style>

</head>
<body>

<div class="card">
  <h2>💧 Humedad</h2>
  <div class="valor" id="val-hum">--%</div>
  <div class="barra">
    <div class="progreso" id="bar-hum"></div>
  </div>
  <div id="est-hum" class="estado">Cargando...</div>
</div>

<div class="card">
  <h2>🌡️ Temperatura</h2>
  <div class="valor" id="val-temp">--°C</div>
  <div class="barra">
    <div class="progreso" id="bar-temp"></div>
  </div>
  <div id="est-temp" class="estado">Cargando...</div>
</div>

<script>
const token = "c59bdf0e-30f2-4b0a-b931-9c3fd843229b";

async function consultarTago(variable) {
  try {
    const res = await fetch(`https://api.tago.io/data?variable=${variable}&qty=1`, {
      headers: { "Device-Token": token }
    });
    const data = await res.json();
    return data.result && data.result.length > 0 ? data.result[0].value : null;
  } catch (e) {
    console.error("Error con " + variable, e);
    return null;
  }
}

async function actualizarTodo() {
  const hum = await consultarTago("Humidity");
  const temp = await consultarTago("Temperature");

  if (hum !== null) actualizarInterfaz("hum", hum, "%");
  if (temp !== null) actualizarInterfaz("temp", temp, "°C");
}

function actualizarInterfaz(tipo, valor, unidad) {
  const valEl = document.getElementById(`val-${tipo}`);
  const barEl = document.getElementById(`bar-${tipo}`);
  const estEl = document.getElementById(`est-${tipo}`);

  valEl.innerText = valor + unidad;
  
  // Ajuste de barra (asumiendo max 100 para ambos por simplicidad)
  barEl.style.width = Math.min(valor, 100) + "%";

  let color = "";
  let texto = "";

  if (tipo === "hum") {
    if (valor < 30) { color = "#ff4d4d"; texto = "Seco 🥵"; }
    else if (valor < 60) { color = "#ffaa00"; texto = "Normal 🙂"; }
    else { color = "#00ff88"; texto = "Húmedo 💧"; }
  } else {
    // Lógica para temperatura
    if (valor < 18) { color = "#00d4ff"; texto = "Frío ❄️"; }
    else if (valor < 30) { color = "#00ff88"; texto = "Ideal 🌡️"; }
    else { color = "#ff4d4d"; texto = "Caliente 🔥"; }
  }

  barEl.style.background = color;
  valEl.style.color = color;
  estEl.innerText = texto;
}

setInterval(actualizarTodo, 5000);
actualizarTodo();

</script>
</body>
</html>
